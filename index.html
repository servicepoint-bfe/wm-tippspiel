<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM 2026 Tipp vs. Realität</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C1117; --bg2:#0A0E13; --surf:#141C24; --surf2:#19232D;
    --line:#21303B; --line2:#2C3F4D;
    --ink:#ECF3EF; --mut:#90A1A9; --mut2:#637580;
    --grass:#34E27A; --grass-d:#1f8f4f;
    --gold:#F5C542; --gold-d:#9b7c1f;
    --heat:#FF8C42; --red:#ff9d9d; --red-d:#7a2f2f;
    --r:14px;
    --fd:'Oswald',system-ui,sans-serif;
    --fb:'Inter',system-ui,sans-serif;
    --fm:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--fb); color:var(--ink); background:var(--bg); line-height:1.55;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px}
  header.top{position:sticky;top:0;z-index:40;background:rgba(10,14,19,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top-in{display:flex;align-items:center;gap:14px;padding:11px 16px;max-width:1180px;margin:0 auto}
  .brand{display:flex;align-items:baseline;gap:9px;font-family:var(--fd);font-weight:700}
  .tabs{margin-left:auto;display:flex;gap:4px;background:var(--surf);padding:4px;border-radius:11px;border:1px solid var(--line)}
  .tab{font-family:var(--fd);font-weight:600;font-size:13px;text-transform:uppercase;color:var(--mut);background:none;border:0;cursor:pointer;padding:7px 13px;border-radius:8px}
  .tab.is-active{background:var(--grass);color:#082012}
  .hero{padding:34px 0 24px;border-bottom:1px solid var(--line)}
  .hero h1{font-family:var(--fd);font-size:clamp(30px,6vw,58px);text-transform:uppercase}
  .panel{display:none} .panel.is-active{display:block}
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .gc{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:14px}
  .m{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:6px;border-bottom:1px solid var(--line2)}
  .mc{text-align:center;font-size:12px;font-family:var(--fm)}
  .ghost-btn{background:none;border:1px solid var(--line2);color:var(--grass);padding:8px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <div class="brand">WM 2026 Tipp vs. Real <span id="lastUpdateText" style="font-size:10px;color:var(--mut)"></span></div>
    <div class="tabs">
      <button id="updateResultsBtn" class="tab">🔄 Resultate laden</button>
      <button class="tab is-active" data-p="groups">Gruppen</button>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="panel is-active" id="p-groups">
    <div class="lead"><button class="ghost-btn" id="toggleAll">Alle Spiele aufklappen</button></div>
    <div class="groups" id="groups"></div>
  </section>
</main>

<script>
const T={MEX:['Mexiko','🇲🇽'],KOR:['Südkorea','🇰🇷'],CZE:['Tschechien','🇨🇿'],RSA:['Südafrika','🇿🇦'],CAN:['Kanada','🇨🇦'],BIH:['Bosnien','🇧🇦'],QAT:['Katar','🇶🇦'],SUI:['Schweiz','🇨🇭'],BRA:['Brasilien','🇧🇷'],MAR:['Marokko','🇲🇦'],HAI:['Haiti','🇭🇹'],SCO:['Schottland','🏴󠁧󠁢󠁳󠁣󠁴󠁿'],USA:['USA','🇺🇸'],PAR:['Paraguay','🇵🇾'],AUS:['Australien','🇦🇺'],TUR:['Türkei','🇹🇷'],GER:['Deutschland','🇩🇪'],CUW:['Curaçao','🇨🇼'],CIV:['Elfenbeinküste','🇨🇮'],ECU:['Ecuador','🇪🇨'],NED:['Niederlande','🇳🇱'],JPN:['Japan','🇯🇵'],SWE:['Schweden','🇸🇪'],TUN:['Tunesien','🇹🇳'],BEL:['Belgien','🇧🇪'],EGY:['Ägypten','🇪🇬'],IRN:['Iran','🇮🇷'],NZL:['Neuseeland','🇳🇿'],ESP:['Spanien','🇪🇸'],CPV:['Kap Verde','🇨🇻'],KSA:['Saudi-Arabien','🇸🇦'],URU:['Uruguay','🇺🇾'],FRA:['Frankreich','🇫🇷'],SEN:['Senegal','🇸🇳'],IRQ:['Irak','🇮🇶'],NOR:['Norwegen','🇳🇴'],ARG:['Argentinien','🇦🇷'],ALG:['Algerien','🇩🇿'],AUT:['Österreich','🇦🇹'],JOR:['Jordanien','🇯🇴'],POR:['Portugal','🇵🇹'],COD:['DR Kongo','🇨🇩'],UZB:['Usbekistan','🇺🇿'],COL:['Kolumbien','🇨🇴'],ENG:['England','🏴󠁧󠁢󠁥󠁮󠁧󠁿'],CRO:['Kroatien','🇭🇷'],GHA:['Ghana','🇬🇭'],PAN:['Panama','🇵🇦']};
const n=k=>T[k][0], f=k=>T[k][1];

// Alle Resultate sind initial NULL. Nur via API werden sie gefüllt.
const GROUPS=[
 {id:'A',m:[['MEX','KOR',2,1,null],['MEX','RSA',2,0,null],['MEX','CZE',1,1,null],['KOR','CZE',2,1,null],['KOR','RSA',2,0,null],['CZE','RSA',2,1,null]]},
 {id:'B',m:[['SUI','CAN',1,0,null],['SUI','QAT',2,0,null],['SUI','BIH',2,1,null],['CAN','BIH',2,1,null],['CAN','QAT',2,0,null],['BIH','QAT',2,1,null]]},
 {id:'C',m:[['BRA','MAR',2,0,null],['BRA','HAI',3,0,null],['BRA','SCO',1,1,null],['MAR','SCO',2,1,null],['MAR','HAI',3,0,null],['SCO','HAI',2,1,null]]},
 {id:'D',m:[['USA','TUR',2,1,null],['USA','PAR',2,1,null],['USA','AUS',2,0,null],['TUR','PAR',2,1,null],['TUR','AUS',2,1,null],['PAR','AUS',1,1,null]]},
 {id:'E',m:[['GER','CUW',3,0,null],['GER','CIV',2,1,null],['GER','ECU',2,1,null],['ECU','CIV',1,0,null],['ECU','CUW',2,0,null],['CIV','CUW',2,1,null]]},
 {id:'F',m:[['NED','JPN',2,1,null],['NED','SWE',3,1,null],['NED','TUN',2,0,null],['JPN','SWE',2,1,null],['JPN','TUN',2,1,null],['SWE','TUN',2,1,null]]},
 {id:'G',m:[['BEL','NZL',2,0,null],['BEL','EGY',2,1,null],['BEL','IRN',1,1,null],['IRN','EGY',1,0,null],['IRN','NZL',2,0,null],['EGY','NZL',2,1,null]]},
 {id:'H',m:[['ESP','CPV',3,0,null],['ESP','KSA',2,0,null],['ESP','URU',2,1,null],['URU','KSA',2,0,null],['URU','CPV',2,0,null],['KSA','CPV',2,1,null]]},
 {id:'I',m:[['FRA','SEN',2,1,null],['FRA','NOR',2,1,null],['FRA','IRQ',2,0,null],['NOR','SEN',2,1,null],['NOR','IRQ',3,0,null],['SEN','IRQ',2,0,null]]},
 {id:'J',m:[['ARG','ALG',3,0,null],['ARG','JOR',2,0,null],['ARG','AUT',2,1,null],['AUT','ALG',2,1,null],['AUT','JOR',3,1,null],['ALG','JOR',2,1,null]]},
 {id:'K',m:[['POR','COL',2,1,null],['POR','UZB',2,0,null],['POR','COD',2,1,null],['COL','UZB',3,1,null],['COL','COD',2,1,null],['COD','UZB',1,1,null]]},
 {id:'L',m:[['ENG','CRO',2,0,null],['ENG','PAN',3,0,null],['ENG','GHA',2,1,null],['CRO','GHA',2,1,null],['CRO','PAN',2,0,null],['GHA','PAN',2,1,null]]}
];

function renderGroups(){
  const wrap=document.getElementById('groups'); wrap.innerHTML='';
  GROUPS.forEach(g=>{
    const card=document.createElement('div'); card.className='gc';
    card.innerHTML=`<h3>Gruppe ${g.id}</h3>`+g.m.map(x=>`
      <div class="m">
        <div>${f(x[0])} ${n(x[0])}</div>
        <div class="mc">Tipp: ${x[2]}:${x[3]}<br>Real: ${x[4]?x[4][0]+':'+x[4][1]:'–'}</div>
        <div>${n(x[1])} ${f(x[1])}</div>
      </div>`).join('');
    wrap.appendChild(card);
  });
}

document.getElementById('updateResultsBtn').addEventListener('click', async (e) => {
  const btn = e.target;
  try {
    const response = await fetch('https://api-football-v1.p.rapidapi.com/v3/fixtures?league=1&season=2026', {
      headers: {'x-rapidapi-key': '3c1437b61amsh515509aac136e35p1af227jsn6e08e01485a8', 'x-rapidapi-host': 'api-football-v1.p.rapidapi.com'}
    });
    const data = await response.json();
    
    // API Daten nur anwenden, wenn Match wirklich beendet ('FT')
    data.response.forEach(match => {
        if(match.fixture.status.short === 'FT') {
            const h = T[match.teams.home.name.substring(0,3).toUpperCase()] ? match.teams.home.name.substring(0,3).toUpperCase() : null; // Mapping nötig
            // ... (Hier würde das Mapping der API Namen auf Kürzel erfolgen)
        }
    });
    
    document.getElementById('lastUpdateText').textContent = 'Stand: ' + new Date().toLocaleTimeString();
  } catch(err) { btn.textContent = 'API Fehler'; }
});

renderGroups();
</script>
</body>
</html>
